set -a terminal-features "tmux-256color:RGB"
set -g prefix C-SPACE
set -g base-index 1
set -g renumber-windows on   
set -g mode-keys vi
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"
set -g window-status-current-style "fg=blue bold"
set -g status-right '#{prefix_highlight} %a %Y-%m-%d %H:%M'
set -g status-left ""
set -g message-style "bg=blue,fg=black"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Search Mode VI
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -i'
bind P paste-buffer

bind g run-shell "~/.config/scripts/open_github.sh"
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded tmux.conf"
bind f run-shell "tmux neww ~/.config/scripts/tmux-session-dispensary.sh"


run '~/.tmux/plugins/tpm/tpm'
